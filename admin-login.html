<!doctype html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>MS Boutique Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="NOINDEX,NOFOLLOW">
  <link rel="icon" type="image/jpeg" href="assets/img/logo/ms boutique logo.png">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/fontawesome.min.css">
  <link rel="stylesheet" href="assets/css/admin-dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Italiana&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(201,162,77,0.22), transparent 35%),
        radial-gradient(circle at bottom right, rgba(15,61,46,0.4), transparent 40%),
        linear-gradient(135deg, #091235 0%, #0F3D2E 100%);
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }

    .login-hero,
    .login-panel {
      border: 1px solid rgba(201,162,77,0.2);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
    }

    .login-hero {
      padding: 40px;
      background: rgba(15, 61, 46, 0.65);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 540px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .brand img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      padding: 8px;
    }

    .brand h1 {
      font-family: 'Italiana', serif;
      font-size: 42px;
      margin: 0;
      color: #F5E9C9;
    }

    .login-hero h2 {
      font-family: 'Cormorant', serif;
      font-size: clamp(42px, 6vw, 68px);
      line-height: 0.95;
      margin: 0 0 18px;
      color: #fff8ea;
    }

    .login-hero p {
      max-width: 540px;
      color: rgba(255,255,255,0.82);
      font-size: 16px;
      line-height: 1.8;
      margin: 0;
    }

    .login-points {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .point {
      padding: 16px;
      border-radius: 18px;
      background: rgba(9,18,53,0.35);
      border: 1px solid rgba(201,162,77,0.16);
      color: rgba(255,255,255,0.9);
      font-size: 14px;
    }

    .login-panel {
      background: rgba(251,248,241,0.96);
      color: #3D2314;
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-panel h3 {
      font-family: 'Italiana', serif;
      font-size: 38px;
      margin: 0 0 10px;
      color: #5C4033;
    }

    .login-panel .subtitle {
      color: #6b4d3c;
      margin-bottom: 26px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      color: #5C4033;
    }

    .form-control {
      width: 100%;
      border: 1px solid rgba(92,64,51,0.25);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffdf8;
      color: #3D2314;
    }

    .form-control:focus {
      border-color: #C9A24D;
      box-shadow: 0 0 0 4px rgba(201,162,77,0.15);
      outline: none;
    }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px 18px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #5C4033, #3D2314);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn-login:hover {
      filter: brightness(1.05);
    }

    .error-message {
      margin-top: 14px;
      color: #9b1c1c;
      min-height: 22px;
      font-size: 14px;
    }

    .helper-links {
      margin-top: 18px;
      font-size: 13px;
      color: #6b4d3c;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .helper-links a {
      color: #5C4033;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-hero {
        min-height: auto;
      }

      .login-points {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
   
    <section class="login-panel">
      <h3>Welcome back</h3>
      <div class="subtitle">Enter your admin credentials to continue.</div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label for="adminLoginUsername">Username or Email</label>
          <input id="adminLoginUsername" class="form-control" type="text" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="adminLoginPassword">Password</label>
          <input id="adminLoginPassword" class="form-control" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        <div id="adminLoginError" class="error-message"></div>
      </form>
      <div class="helper-links">
        <a href="admin-dashboard.html">Go to dashboard</a>
        <a href="index.html">Back to store</a>
      </div>
    </section>
  </div>

  <script src="assets/js/api-config.js"></script>
  <script>
    (function () {
      const baseUrl = window.YASSO_CONFIG?.API_BASE_URL || '/api';

      const existingToken = localStorage.getItem('adminToken');
      if (existingToken) {
        window.location.href = 'admin-dashboard.html';
        return;
      }

      const form = document.getElementById('adminLoginForm');
      const usernameInput = document.getElementById('adminLoginUsername');
      const passwordInput = document.getElementById('adminLoginPassword');
      const errorBox = document.getElementById('adminLoginError');

      function setError(message) {
        errorBox.textContent = message || '';
      }

      async function parseError(response) {
        try {
          const contentType = response.headers.get('content-type') || '';
          if (contentType.includes('application/json')) {
            const data = await response.json();
            return data.message || data.error || 'Login failed. Please check your credentials.';
          }
          const text = await response.text();
          return text || 'Login failed. Please check your credentials.';
        } catch (_error) {
          return 'Login failed. Please check your credentials.';
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setError('');

        const usernameOrEmail = usernameInput.value.trim();
        const password = passwordInput.value;

        try {
          const response = await fetch(`${baseUrl}/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({ usernameOrEmail, password })
          });

          if (!response.ok) {
            setError(await parseError(response));
            return;
          }

          const data = await response.json();
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUsername', data.username || usernameOrEmail);
          localStorage.setItem('adminRefreshToken', data.refreshToken || '');
          window.location.href = 'admin-dashboard.html';
        } catch (error) {
          setError(error?.message || 'Connection error. Please try again.');
        }
      });
    })();
  </script>
</body>
</html>
