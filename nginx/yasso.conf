# YASSO frontend nginx config
# Place this file in /etc/nginx/sites-available/yasso
# Then enable with:
#   sudo ln -s /etc/nginx/sites-available/yasso /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Recommended: deploy project to a path without spaces (example below)
    root /var/www/yasso;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Main routing:
    # - serves existing files
    # - supports extensionless URLs (/about -> /about.html)
    # - returns 404 for unknown paths
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Proxy API through same domain
    # Backend expected on localhost:8081
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PHP support (only if you need mail.php)
    # location ~ \.php$ {
    #     include snippets/fastcgi-php.conf;
    #     fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    # }

    # Block hidden files except Let's Encrypt path
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
